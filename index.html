<style>
  html,body{margin:0;height:100%;background:#0e0c10;color:#f2ede4;
    font:16px/1.5 system-ui,sans-serif;display:flex;align-items:center;justify-content:center}
  .box{text-align:center;padding:24px}
  .logoWrap{position:relative; width:150px; height:150px; margin:0 auto}
  .logoWrap img{width:150px; height:150px; border-radius:28px; display:block;
    transform-origin:50% 62%; animation:drum 1s cubic-bezier(.25,0,.2,1) infinite}
  /* rytmus bicích: kopák | kopák | ghost snare (120 BPM) */
  @keyframes drum{
    0%{transform:scale(1)}
    5%{transform:scale(1.09) rotate(-1.3deg)}
    15%{transform:scale(1)}
    50%{transform:scale(1)}
    55%{transform:scale(1.09) rotate(1.3deg)}
    65%{transform:scale(1)}
    75%{transform:scale(1.04)}
    83%{transform:scale(1)}
    100%{transform:scale(1)}
  }
  .logoWrap::before, .logoWrap::after{content:''; position:absolute; inset:-8px;
    border-radius:34px; border:2px solid #e8a13c; opacity:0; pointer-events:none;
    animation:ring 1s ease-out infinite}
  .logoWrap::after{border-color:rgba(242,237,228,.55); animation-delay:.5s}
  @keyframes ring{
    0%{transform:scale(.85); opacity:.55}
    70%{opacity:0}
    100%{transform:scale(1.45); opacity:0}
  }
  @media (prefers-reduced-motion: reduce){
    .logoWrap img, .logoWrap::before, .logoWrap::after{animation:none}
  }
  h1{font-family:Oswald,system-ui,sans-serif; font-weight:600}
  h1{font-size:23px;letter-spacing:.1em;margin:18px 0 4px;text-transform:uppercase}
  h1 b{color:#e8a13c}
  p{color:#8d8696;font-size:14px;margin:6px 0 18px}
  a.btn{display:inline-block;background:#e8a13c;color:#141216;font-weight:700;
    text-decoration:none;padding:14px 30px;border-radius:12px}
  footer{position:fixed;left:0;right:0;bottom:14px;text-align:center;
    color:#8d8696;font-size:12px;letter-spacing:.03em;padding:0 16px}
  footer b{color:#e8a13c}
  .hint{display:none;background:#18151d;border:1px solid #2c2733;border-radius:12px;
    padding:12px 16px;margin:0 auto 16px;max-width:320px;font-size:13.5px;
    color:#b8b0c4;line-height:1.55;text-align:left}
  .hint b{color:#f2ede4}
  a.btn.ghost{background:none;border:1px solid #e8a13c;color:#e8a13c;margin-top:10px}
</style>
